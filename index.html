<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI日報</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
      border-bottom: 1px solid #2d3748;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 { font-size: 1.2rem; font-weight: 700; }
    header .badge {
      background: #3182ce; color: white;
      font-size: 0.68rem; padding: 2px 8px;
      border-radius: 99px; font-weight: 600;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 0 14px 80px; }

    /* ── 日付セクション ── */
    .date-section { margin-top: 20px; }

    .date-header {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; padding: 13px 14px;
      background: #1a1f2e; border: 1px solid #2d3748;
      border-radius: 12px; margin-bottom: 4px;
      user-select: none;
    }
    .date-header:hover { background: #1e2433; }
    .date-text { font-size: 1rem; font-weight: 700; color: #90cdf4; flex: 1; }
    .count-badge {
      background: #2d3748; color: #a0aec0;
      font-size: 0.68rem; padding: 2px 8px; border-radius: 99px;
    }
    .toggle-icon { color: #718096; font-size: 0.8rem; transition: transform 0.2s; }
    .date-header.collapsed .toggle-icon { transform: rotate(-90deg); }
    .date-content.hidden { display: none; }

    /* ── メインタブ（海外/国内） ── */
    .main-tabs {
      display: flex; gap: 4px; padding: 10px 0 6px;
    }
    .main-tab-btn {
      flex: 1; padding: 10px 4px;
      background: #1a1f2e; border: 1px solid #2d3748;
      border-radius: 8px; color: #718096;
      font-size: 0.88rem; font-weight: 600;
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .main-tab-btn.active {
      background: #2b4a7a; border-color: #3182ce; color: #90cdf4;
    }
    .main-tab-panel { display: none; }
    .main-tab-panel.active { display: block; }

    /* ── 国内サブタブ ── */
    .sub-tabs {
      display: flex; gap: 3px;
      padding: 8px 0 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .sub-tabs::-webkit-scrollbar { display: none; }
    .sub-tab-btn {
      flex-shrink: 0;
      padding: 7px 12px;
      background: #161b27; border: 1px solid #2d3748;
      border-radius: 20px; color: #718096;
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .sub-tab-btn.active {
      background: #1c3a2a; border-color: #38a169; color: #68d391;
    }
    .sub-tab-panel { display: none; }
    .sub-tab-panel.active { display: block; }

    /* ── ニュースカード ── */
    .news-card {
      background: #1a1f2e; border: 1px solid #2d3748;
      border-radius: 12px; padding: 14px;
      margin-bottom: 10px; transition: border-color 0.15s;
    }
    .news-card:hover { border-color: #4a5568; }

    .card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .source-tag {
      font-size: 0.66rem; padding: 2px 7px;
      border-radius: 99px; font-weight: 700;
    }
    .tag-hot   { background: #3d1a1a; color: #fc8181; }
    .tag-sns   { background: #1c3a2a; color: #68d391; }
    .tag-media { background: #1a365d; color: #90cdf4; }
    .tag-tech  { background: #2d1f4a; color: #b794f4; }
    .tag-yt    { background: #3d1a1a; color: #fc8181; }
    .tag-note  { background: #2d2a1a; color: #f6e05e; }

    .card-title {
      font-size: 0.95rem; font-weight: 700;
      color: #e2e8f0; line-height: 1.5; margin-bottom: 10px;
    }
    .card-title a { color: #90cdf4; text-decoration: none; }
    .card-title a:hover { text-decoration: underline; }

    /* カード内セクション */
    .card-section { margin-bottom: 8px; }
    .card-section:last-child { margin-bottom: 0; }

    .section-label {
      font-size: 0.72rem; font-weight: 700;
      margin-bottom: 3px; display: block;
    }
    .label-point   { color: #fc8181; }
    .label-detail  { color: #90cdf4; }
    .label-meaning { color: #68d391; }
    .label-compare { color: #b794f4; }

    .section-body {
      font-size: 0.82rem; color: #a0aec0;
      line-height: 1.7;
      border-left: 2px solid #2d3748;
      padding-left: 9px;
    }
    .section-body a { color: #90cdf4; text-decoration: none; }
    .section-body a:hover { text-decoration: underline; }

    .card-source {
      margin-top: 8px; font-size: 0.72rem; color: #4a5568;
    }
    .card-source a { color: #4a5568; text-decoration: none; }
    .card-source a:hover { color: #718096; }

    .empty { color: #4a5568; font-size: 0.85rem; padding: 24px 0; text-align: center; }

    footer {
      text-align: center; padding: 20px;
      color: #4a5568; font-size: 0.72rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>📰 AI日報</h1>
    <span class="badge">by AI秘書</span>
  </div>
</header>

<div class="container" id="news-container">
  <!-- ニュースはPythonスクリプトによってここに挿入されます -->
<div class="date-section" data-date="2026-04-06">
  <div class="date-header" onclick="toggleDate('2026-04-06')">
    <span class="date-text">📅 2026-04-06</span>
    <span class="count-badge">0件</span>
    <span class="toggle-icon">▼</span>
  </div>
  <div class="date-content">
    <div class="main-tabs">
      <button class="main-tab-btn active" data-tab="overseas" onclick="switchMain('2026-04-06','overseas')">🌏 海外</button>
      <button class="main-tab-btn" data-tab="domestic" onclick="switchMain('2026-04-06','domestic')">🇯🇵 国内</button>
    </div>
    <div class="main-tab-panel overseas active"><p class="empty">データなし</p></div>
    <div class="main-tab-panel domestic">
      <div class="sub-tabs">
        <button class="sub-tab-btn active" data-tab="net"     onclick="switchSub('2026-04-06','net')">📰 ネット</button>
        <button class="sub-tab-btn"        data-tab="x"       onclick="switchSub('2026-04-06','x')">🐦 X</button>
        <button class="sub-tab-btn"        data-tab="youtube" onclick="switchSub('2026-04-06','youtube')">📺 YouTube</button>
        <button class="sub-tab-btn"        data-tab="note"    onclick="switchSub('2026-04-06','note')">📝 note</button>
      </div>
      <div class="sub-tab-panel net active"><p class="empty">データなし</p></div>
      <div class="sub-tab-panel x"><p class="empty">データなし</p></div>
      <div class="sub-tab-panel youtube"><p class="empty">データなし</p></div>
      <div class="sub-tab-panel note"><p class="empty">データなし</p></div>
    </div>
  </div>
</div>
<footer>AI秘書が毎朝自動生成</footer>

<script>
  function switchMain(dateId, tab) {
    const sec = document.querySelector(`.date-section[data-date="${dateId}"]`);
    sec.querySelectorAll('.main-tab-panel').forEach(p => p.classList.remove('active'));
    sec.querySelectorAll('.main-tab-btn').forEach(b => b.classList.remove('active'));
    sec.querySelector(`.main-tab-btn[data-tab="${tab}"]`).classList.add('active');
    sec.querySelector(`.main-tab-panel.${tab}`).classList.add('active');
  }

  function switchSub(dateId, tab) {
    const sec = document.querySelector(`.date-section[data-date="${dateId}"]`);
    sec.querySelectorAll('.sub-tab-panel').forEach(p => p.classList.remove('active'));
    sec.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
    sec.querySelector(`.sub-tab-btn[data-tab="${tab}"]`).classList.add('active');
    sec.querySelector(`.sub-tab-panel.${tab}`).classList.add('active');
  }

  function toggleDate(dateId) {
    const sec = document.querySelector(`.date-section[data-date="${dateId}"]`);
    sec.querySelector('.date-header').classList.toggle('collapsed');
    sec.querySelector('.date-content').classList.toggle('hidden');
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.date-section').forEach((sec, i) => {
      if (i > 0) {
        sec.querySelector('.date-header').classList.add('collapsed');
        sec.querySelector('.date-content').classList.add('hidden');
      }
    });
  });
</script>

</body>
</html>
